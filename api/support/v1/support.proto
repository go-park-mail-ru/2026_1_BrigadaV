syntax = "proto3";

package support.v1;

option go_package = "guidely-app/pkg/pb/support/v1;supportv1";

service SupportService {
  rpc CreateTicket(CreateTicketRequest) returns (Ticket);
  rpc ListMyTickets(ListTicketsRequest) returns (ListTicketsResponse);
  rpc GetTicket(GetTicketRequest) returns (Ticket);
  rpc SendMessage(SendMessageRequest) returns (Message);
  
  rpc GetStats(Empty) returns (StatsResponse);
  rpc ListOpenTickets(ListTicketsRequest) returns (ListTicketsResponse);
  rpc ReplyAsAdmin(ReplyAsAdminRequest) returns (Message);
  rpc UpdateTicketStatus(UpdateTicketStatusRequest) returns (Ticket);
  rpc SubscribeToTicket(SubscribeRequest) returns (stream Message);
}

message Empty {}

message CreateTicketRequest {
  int64 user_id = 1;
  string category = 2;
  string subject = 3;
  string body = 4;
}

message SubscribeRequest {
  int64 ticket_id = 1;
}

message ListTicketsRequest {

}

message GetTicketRequest {
  int64 ticket_id = 1;
}

message SendMessageRequest {
  int64 ticket_id = 1;
  string text = 2;
}

message ReplyAsAdminRequest {
  int64 ticket_id = 1;
  string text = 2;
}

message UpdateTicketStatusRequest {
  int64 ticket_id = 1;
  string status = 2;
}

message Ticket {
  int64 id = 1;
  int64 user_id = 2;
  string category = 3;
  string status = 4;
  string subject = 5;
  string body = 6;
  string created_at = 7;        
  repeated Message messages = 8;
}

message Message {
  int64 id = 1;
  int64 ticket_id = 2;
  string author_type = 3;
  string text = 4;
  string created_at = 5;
}

message ListTicketsResponse {
  repeated Ticket tickets = 1;
}

message StatsResponse {
  int64 open_count = 1;
  int64 in_progress_count = 2;
  int64 closed_count = 3;
  
  map<string, int64> by_category = 4;
  
  int64 total_tickets = 5;
  int64 total_messages = 6;
}