version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: guidely-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1111}
      POSTGRES_DB: ${DB_NAME:-texnopark}
    ports:
      - "9999:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guidely-network
    restart: unless-stopped

  migrations:
    image: golang:1.25-alpine
    container_name: guidely-migrations
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://postgres:1111@postgres:5432/texnopark?sslmode=disable
    command: sh -c "go install github.com/pressly/goose/v3/cmd/goose@latest && goose -dir ./migrations up"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - guidely-network
    restart: "no"

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: guidely-auth
    env_file:
      - ./.env.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8085"
      - "9101:9101"
    networks:
      - guidely-network
    restart: unless-stopped

  album:
    build:
      context: .
      dockerfile: Dockerfile.album
    container_name: guidely-album
    env_file:
      - ./.env.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8086:8086"
      - "9102:9102"
    networks:
      - guidely-network
    restart: unless-stopped

  review:
    build:
      context: .
      dockerfile: Dockerfile.review
    container_name: guidely-review
    env_file:
      - ./.env.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8087:8087"
      - "9103:9103"
    networks:
      - guidely-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guidely-backend
    env_file:
      - ./.env.example
    environment:
      - AUTH_GRPC_ADDR=auth:8085
      - ALBUM_GRPC_ADDR=album:8086
      - REVIEW_GRPC_ADDR=review:8087
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      album:
        condition: service_started
      review:
        condition: service_started
    ports:
      - "8080:8080"
      - "9100:9100"
    networks:
      - guidely-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: guidely-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - guidely-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: guidely-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9109:9100"
    networks:
      - guidely-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: guidely-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - auth
      - album
      - review
      - node-exporter
    networks:
      - guidely-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: guidely-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - guidely-network
    restart: unless-stopped

networks:
  guidely-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
