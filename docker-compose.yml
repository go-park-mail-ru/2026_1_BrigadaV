version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: guidely-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1111}
      POSTGRES_DB: ${DB_NAME:-texnopark}
    ports:
      - "9999:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guidely-network
    restart: unless-stopped

  migrations:
    image: golang:1.25-alpine
    container_name: guidely-migrations
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://postgres:1111@postgres:5432/texnopark?sslmode=disable
    command: sh -c "go install github.com/pressly/goose/v3/cmd/goose@latest && goose -dir ./migrations up"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - guidely-network
    restart: "no"

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: guidely-auth
    env_file:
      - ./.env.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8085"
    networks:
      - guidely-network
    restart: unless-stopped

  album:
    build:
      context: .
      dockerfile: Dockerfile.album
    container_name: guidely-album
    env_file:
      - ./.env.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8086:8086"
    networks:
      - guidely-network
    restart: unless-stopped

  review:
    build:
      context: .
      dockerfile: Dockerfile.review
    container_name: guidely-review
    env_file:
      - ./.env.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8087:8087"
    networks:
      - guidely-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guidely-backend
    env_file:
      - ./.env.example
    environment:
      - AUTH_GRPC_ADDR=auth:8085
      - ALBUM_GRPC_ADDR=album:8086
      - REVIEW_GRPC_ADDR=review:8087
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      album:
        condition: service_started
      review:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/root/uploads
    networks:
      - guidely-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: guidely-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - guidely-network
    restart: unless-stopped

networks:
  guidely-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
