version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guidely-backend
    environment:
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-1111}
      - DB_NAME=${DB_NAME:-texnopark}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - guidely-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: guidely-frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - guidely-network

  postgres:
    image: postgres:16-alpine
    container_name: guidely-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1111}
      POSTGRES_DB: ${DB_NAME:-texnopark}
    ports:
      - "9999:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guidely-network
    restart: unless-stopped

networks:
  guidely-network:
    driver: bridge

volumes:
  postgres_data: