version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: guidely-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "9999:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guidely-network
    restart: unless-stopped

  migrations:
    image: golang:1.25-alpine
    container_name: guidely-migrations
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=${DATABASE_URL}
    command: sh -c "go install github.com/pressly/goose/v3/cmd/goose@latest && goose -dir ./migrations up"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - guidely-network
    restart: "no"

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: guidely-auth
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8085"
      - "9101:9101"
    networks:
      - guidely-network
    restart: unless-stopped

  album:
    build:
      context: .
      dockerfile: Dockerfile.album
    container_name: guidely-album
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8086:8086"
      - "9102:9102"
    networks:
      - guidely-network
    restart: unless-stopped

  review:
    build:
      context: .
      dockerfile: Dockerfile.review
    container_name: guidely-review
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8087:8087"
      - "9103:9103"
    networks:
      - guidely-network
    restart: unless-stopped


  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: guidely-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - guidely-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guidely-backend
    env_file:
      - ./.env
    environment:
      - AUTH_GRPC_ADDR=auth:8085
      - ALBUM_GRPC_ADDR=album:8086
      - REVIEW_GRPC_ADDR=review:8087
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      album:
        condition: service_started
      review:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "9100:9100"
    networks:
      - guidely-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: guidely-frontend
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - guidely-network
    restart: unless-stopped
    depends_on:
      - backend

  node-exporter:
    image: prom/node-exporter:latest
    container_name: guidely-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9109:9100"
    networks:
      - guidely-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: guidely-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "8092:9090"
    depends_on:
      - backend
      - auth
      - album
      - review
      - node-exporter
    networks:
      - guidely-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: guidely-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "8091:3000"
    depends_on:
      - prometheus
    networks:
      - guidely-network
    restart: unless-stopped

networks:
  guidely-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
  uploads_data:
