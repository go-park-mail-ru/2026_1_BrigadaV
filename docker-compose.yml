version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guidely-backend
    environment:
      - SERVER_PORT=${PORT:-8080}
      - DATABASE_URL=${DATABASE_URL}
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    networks:
      - guidely-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: guidely-frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - guidely-network

  postgres:
    image: postgres:16-alpine
    container_name: guidely-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1111}
      POSTGRES_DB: ${DB_NAME:-texnopark}
    ports:
      - "9999:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guidely-network
    restart: unless-stopped

  migrations:
    image: golang:1.25-alpine
    container_name: guidely-migrations
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-1111}@postgres:5432/${DB_NAME:-texnopark}?sslmode=disable
    command: sh -c "go install github.com/pressly/goose/v3/cmd/goose@latest && goose -dir ./migrations up"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - guidely-network
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: guidely-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - guidely-network

networks:
  guidely-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
